name: Run SWiSH Presentation

on:
  schedule:
    - cron: '0 1 * * 1-5'   # 8:00 AM Vietnam time (UTC+7), Mon–Fri
  workflow_dispatch:
    inputs:
      lesson:
        description: "Lesson to run (F7BD04, F7BD05, F7BD06, F7BD07, F7BD10, F7BD11, F7BD12, F7BD13, F7BD14, F7BD15, F7BD16, F7BD17, F7BD18)"
        required: true
        default: F7BD12

permissions:
  actions: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo mkdir -pm755 /etc/apt/keyrings
          sudo wget -qO /etc/apt/keyrings/winehq-archive.key https://dl.winehq.org/wine-builds/winehq.key
          sudo wget -qNP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/jammy/winehq-jammy.sources
          sudo apt-get update -qq
          sudo apt-get install -y --install-recommends winehq-stable
          sudo apt-get install -y xvfb x11vnc websockify netcat-openbsd x11-utils openbox xdotool pulseaudio fonts-dejavu fonts-liberation fonts-noto-core
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer
          sudo fc-cache -f
          curl -sL https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.tar.gz | tar xz -C /tmp
          sudo mv /tmp/noVNC-1.5.0 /opt/novnc
          echo "Wine version: $(wine --version)"

      - name: Start presentation and VNC
        run: |
          Xvfb :2 -screen 0 1024x768x24 &
          until xdpyinfo -display :2 >/dev/null 2>&1; do sleep 1; done
          export DISPLAY=":2"
          export WINEPREFIX="$HOME/wine_swish"
          export WINEARCH="win32"
          openbox &
          pulseaudio --start --log-target=syslog 2>/dev/null || true
          sleep 2
          export WINEDLLOVERRIDES="mscoree=d;mshtml=d"
          echo "Initializing Wine prefix..."
          timeout 30 wine cmd /c echo init > /dev/null 2>&1 || true
          echo "Setting up Flash..."
          mkdir -p "$WINEPREFIX/drive_c/windows/system32/Macromed/Flash"
          cp Flash32_14_0_0_176.ocx "$WINEPREFIX/drive_c/windows/system32/Macromed/Flash/"
          wine regsvr32 /s "C:\\windows\\system32\\Macromed\\Flash\\Flash32_14_0_0_176.ocx" > /dev/null 2>&1 || true
          printf "OverrideGPUValidation=true\nDisableHardwareAcceleration=1\n" \
            > "$WINEPREFIX/drive_c/windows/system32/Macromed/Flash/mms.cfg"
          echo "Installing Vietnamese-capable fonts..."
          mkdir -p "$WINEPREFIX/drive_c/windows/Fonts"
          find /usr/share/fonts -name "*.ttf" -exec cp {} "$WINEPREFIX/drive_c/windows/Fonts/" \; 2>/dev/null || true
          find /usr/share/fonts -name "*.TTF" -exec cp {} "$WINEPREFIX/drive_c/windows/Fonts/" \; 2>/dev/null || true
          cp "${{ inputs.lesson || 'F7BD12' }}.exe" "$WINEPREFIX/drive_c/lesson.exe"
          FILE_SIZE=$(wc -c < "$WINEPREFIX/drive_c/lesson.exe")
          echo "Lesson file size: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "ERROR: file is too small — likely an LFS pointer, not the real binary"
            cat "$WINEPREFIX/drive_c/lesson.exe"
            exit 1
          fi
          echo "Launching exe..."
          WINEDEBUG="err+all,fixme-all" wine "$WINEPREFIX/drive_c/lesson.exe" > /tmp/wine.log 2>&1 &
          WINE_PID=$!
          sleep 8
          if kill -0 $WINE_PID 2>/dev/null; then
            echo "Wine is running (PID $WINE_PID) — waiting for window..."
          else
            echo "Wine EXITED after 8s — likely crashed"
          fi
          echo "--- Wine log so far ---"
          cat /tmp/wine.log || true
          echo "--- End Wine log ---"
          echo "--- Running Wine processes ---"
          pgrep -la wine || echo "none"
          echo "--- Visible windows ---"
          xdotool search --onlyvisible --name "" 2>/dev/null || echo "none"
          echo "--- End diagnostics ---"
          timeout 60 bash -c 'until xdotool search --onlyvisible --name "" 2>/dev/null | grep -q .; do sleep 2; done' || true
          echo "Waiting 20s for Flash to render..."
          sleep 20
          xdotool search --onlyvisible --name "" 2>/dev/null | while read wid; do
            xdotool windowfocus "$wid" 2>/dev/null || true
            xdotool windowraise "$wid" 2>/dev/null || true
          done
          echo "Starting VNC..."
          x11vnc -display :2 -nopw -forever -noxdamage -listen 0.0.0.0 -fixscreen rotate=0 &
          until nc -z localhost 5900; do sleep 1; done
          websockify --web /opt/novnc 6080 localhost:5900 &
          until nc -z localhost 6080; do sleep 1; done
          echo "VNC and noVNC started."

      - name: Copy mobile viewer
        run: cp mobile.html /opt/novnc/mobile.html

      - name: Start tunnel and print URL
        run: |
          curl -sLo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:6080 --no-autoupdate 2>/tmp/cf.log &
          URL=""
          for i in $(seq 1 24); do
            URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/cf.log 2>/dev/null | head -1)
            [ -n "$URL" ] && break
            sleep 5
          done
          if [ -z "$URL" ]; then
            echo "ERROR: Could not get Cloudflare URL."
            cat /tmp/cf.log
            exit 1
          fi
          echo ""
          echo "============================================"
          echo "  Lesson: ${{ inputs.lesson || 'F7BD12' }}"
          echo "  Desktop: $URL/vnc_lite.html?autoconnect=true"
          echo "  Mobile:  $URL/mobile.html"
          echo "============================================"
          echo ""

      - name: Keep session alive (6 hours) then restart
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 21600
          echo "Session ended — triggering next 6-hour batch..."
          gh workflow run run.yml \
            --repo ${{ github.repository }} \
            --ref main \
            --field lesson=${{ inputs.lesson || 'F7BD12' }}
