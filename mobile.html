<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>SWiSH Presentation</title>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; }
    #screen { width:100%; height:100%; }
    #toolbar {
      position:fixed; bottom:12px; right:12px; z-index:999;
      display:flex; gap:8px;
    }
    .btn {
      background:rgba(30,30,30,0.85); color:#fff; border:1px solid #555;
      border-radius:8px; padding:10px 16px; font-size:16px;
      cursor:pointer; user-select:none; -webkit-user-select:none;
      touch-action:manipulation;
    }
    #kbd-input {
      position:absolute; left:-9999px; top:-9999px;
      width:1px; height:1px; opacity:0;
      font-size:16px; /* prevent iOS zoom on focus */
    }
    #status {
      position:fixed; top:8px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.7); color:#fff; padding:4px 12px;
      border-radius:12px; font-size:13px; font-family:sans-serif;
      pointer-events:none; z-index:999;
    }
  </style>
</head>
<body>
  <div id="screen"></div>
  <div id="status">Connecting…</div>

  <!-- hidden input that triggers iOS keyboard -->
  <input id="kbd-input" type="text" autocomplete="off"
         autocorrect="off" autocapitalize="off" spellcheck="false"/>

  <div id="toolbar">
    <button class="btn" id="btn-kb">⌨ Keyboard</button>
    <button class="btn" id="btn-enter">↵ Enter</button>
  </div>

  <script type="module">
    import RFB from '/core/rfb.js';

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const url = `${proto}://${location.host}`;

    const rfb = new RFB(document.getElementById('screen'), url);
    rfb.scaleViewport = true;
    rfb.resizeSession = false;

    const status = document.getElementById('status');
    rfb.addEventListener('connect',    () => { status.textContent = 'Connected'; setTimeout(()=>status.style.display='none', 2000); });
    rfb.addEventListener('disconnect', () => { status.style.display='block'; status.textContent = 'Disconnected — reconnecting…'; setTimeout(()=>location.reload(), 3000); });

    // ── Keyboard support for iOS ──────────────────────────────────────────────
    const kbdInput = document.getElementById('kbd-input');

    // Send each character typed in the hidden input to VNC
    kbdInput.addEventListener('input', (e) => {
      const val = kbdInput.value;
      for (const ch of val) {
        rfb.sendKey(ch.codePointAt(0), null, true);
        rfb.sendKey(ch.codePointAt(0), null, false);
      }
      kbdInput.value = '';
    });

    // Handle special keys (backspace, enter, tab)
    kbdInput.addEventListener('keydown', (e) => {
      const keyMap = {
        Backspace: 0xFF08,
        Tab:       0xFF09,
        Enter:     0xFF0D,
        Escape:    0xFF1B,
        ArrowLeft: 0xFF51,
        ArrowUp:   0xFF52,
        ArrowRight:0xFF53,
        ArrowDown: 0xFF54,
        Delete:    0xFFFF,
      };
      if (keyMap[e.key]) {
        e.preventDefault();
        rfb.sendKey(keyMap[e.key], null, true);
        rfb.sendKey(keyMap[e.key], null, false);
      }
    });

    document.getElementById('btn-kb').addEventListener('click', () => {
      kbdInput.focus();
    });

    document.getElementById('btn-enter').addEventListener('click', () => {
      rfb.sendKey(0xFF0D, null, true);
      rfb.sendKey(0xFF0D, null, false);
    });

    // Tap on VNC canvas → mouse click passthrough (noVNC handles this)
    // Tap on canvas also pops keyboard if already focused
    document.getElementById('screen').addEventListener('click', () => {
      if (document.activeElement === kbdInput) kbdInput.blur();
    });
  </script>
</body>
</html>
